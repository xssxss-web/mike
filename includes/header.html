<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 字体 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<!-- 第三方样式库 -->
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- 全局样式 -->
<style>
    :root {
        --primary: #e63939;
    }

    body {
        font-family: 'Inter', sans-serif;
    }

    html {
        scroll-behavior: smooth;
    }
    
    .hero-bg {
        background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.55)), url('/images/hero1.jpg') center/cover no-repeat;
    }
    
    .product-card {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .product-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
    }
    
    .nav-link {
        position: relative;
        padding: 1rem 0;
    }
    
    .nav-link:after {
        content: '';
        position: absolute;
        width: 0;
        height: 2px;
        bottom: -2px;
        left: 0;
        background-color: var(--primary);
        transition: width 0.3s ease;
    }
    
    .nav-link:hover:after {
        width: 100%;
    }

    /* 桌面下拉菜单动画 */
    .dropdown-menu {
        opacity: 0;
        visibility: hidden;
        transform: translateY(10px);
        transition: all 0.2s ease;
    }
    .group:hover .dropdown-menu {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
    }
</style>

<!-- Google Analytics 全局统计 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-0H2PGF3J9Q"></script>
<script>

            <!-- 桌面端菜单 -->
            <div class="hidden md:flex items-center space-x-8 text-sm font-medium">
                <a href="/" class="nav-link">Home</a>

                    <a href="#products" class="nav-link flex items-center px-4 py-4">

                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </a>
                    <div class="dropdown-menu absolute left-0 mt-1 w-48 bg-white shadow-xl rounded-xl z-50 pt-1">

            <!-- 右侧按钮 + 移动端汉堡图标 -->

<!-- 移动端菜单交互脚本 -->
<script>
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    const prodBtn = document.getElementById('mobileProdBtn');
    const prodMenu = document.getElementById('mobileProdMenu');

    mobileMenuBtn.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
    });
    prodBtn.addEventListener('click', () => {
        prodMenu.classList.toggle('hidden');
        prodBtn.querySelector('svg').classList.toggle('rotate-180');
    });
</script>
