---
layout: default
title: MikeOK Blog
---

<h1>MikeOK Blog - Yiwu Sourcing Insights</h1>

<p>Latest Posts:</p>

<ul>
  {% for post in site.posts %}
    <li>
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
      <small> ({{ post.date | date: "%Y-%m-%d" }})</small>
    </li>
  {% endfor %}
</ul>

{% if site.posts.size == 0 %}
  <p>还没有发布文章，请先在 _posts 文件夹添加文章。</p>
{% endif %}
